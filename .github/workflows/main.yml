name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++

          - name: macOS Clang
            os: macos-latest
            cc: clang
            cxx: clang++

          - name: Windows MSVC
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Dependencies ----
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev xorg-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install glfw

      # ---- Configure ----
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      # ---- Build ----
      - name: Build
        run: cmake --build build --config Release --parallel

      # ---- Test ----
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
